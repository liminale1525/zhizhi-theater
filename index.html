<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fontsapi.zeoseven.com" crossorigin />
  <link rel="preconnect" href="https://fontsapi-storage.zeoseven.com" crossorigin />
  <title>吱吱的剧笺手札</title>

  <style>
    @import url("https://fontsapi.zeoseven.com/441/main/result.css");
    @import url("https://fontsapi.zeoseven.com/646/main/result.css");

    :root {
      --app-height: 100vh;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --home-bg: url('./assets/1.png');
      --detail-bg: url('./assets/2.png');
      --asset-hole-paper: url('./assets/3.png');
      --asset-paper: url('./assets/4.png');
      --asset-tape-long: url('./assets/5.png');
      --asset-tape-short: url('./assets/6.png');
      --asset-hand-blue: url('./assets/7.png');
      --asset-hand-gray: url('./assets/8.png');
      --asset-note-long: url('./assets/9.png');
      --asset-note-short: url('./assets/10.png');

      --font-title: "JiangChengJieXingTi", "JiangChengJieXingTi-Regular", "Kaiti SC", "STKaiti", "Songti SC", "Noto Serif SC", "STSong", "SimSun", serif;
      --font-body: "XiangcuiDengcusong", "XiangcuiDengcusong-Regular", "Songti SC", "Noto Serif SC", "STSong", "SimSun", serif;
      --font-ui: "XiangcuiDengcusong", "XiangcuiDengcusong-Regular", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

      --ink: #222427;
      --muted: #7d858e;
      --soft-ink: rgba(34, 36, 39, 0.70);
      --blue: #86abc3;
      --blue-deep: #5f8ba6;
      --paper-solid: #fbfbf8;
      --line: rgba(73, 95, 113, 0.16);
      --shadow: 0 18px 48px rgba(45, 57, 68, 0.14);
      --small-shadow: 0 10px 24px rgba(48, 56, 64, 0.11);
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    @supports (height: 100svh) {
      :root { --app-height: 100svh; }
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: normal;
      background: #eef3f5;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: var(--app-height);
      display: grid;
      place-items: center;
      padding: clamp(10px, 2vw, 28px);
    }

    button,
    input,
    textarea {
      font: inherit;
      color: inherit;
      -webkit-font-smoothing: inherit;
    }

    button,
    input,
    textarea {
      -webkit-appearance: none;
      appearance: none;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .app {
      width: min(96vw, 1200px);
      aspect-ratio: 4 / 3;
      position: relative;
      overflow: hidden;
      border-radius: clamp(18px, 2.2vw, 32px);
      background-image: var(--home-bg);
      background-size: cover;
      background-position: center;
      box-shadow: var(--shadow);
      transition: background-image 560ms var(--ease);
      isolation: isolate;
      background-color: #eef3f5;
      transform: translateZ(0);
    }

    .app.is-detail {
      background-image: var(--detail-bg);
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 12% 20%, rgba(255, 255, 255, 0.42), transparent 26%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.03));
      pointer-events: none;
    }

    .geo-bg {
      position: absolute;
      inset: -20%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.32;
      background:
        linear-gradient(135deg, transparent 0 18%, rgba(132, 171, 195, 0.12) 18% 18.8%, transparent 18.8% 42%, rgba(255,255,255,0.28) 42% 42.6%, transparent 42.6% 100%),
        linear-gradient(135deg, transparent 0 58%, rgba(132, 171, 195, 0.10) 58% 58.8%, transparent 58.8% 100%);
      transform: translate3d(-2%, -2%, 0) rotate(0deg);
      animation: driftGeometry 18s linear infinite alternate;
      mix-blend-mode: multiply;
    }

    @keyframes driftGeometry {
      from { transform: translate3d(-2%, -2%, 0) rotate(0deg); }
      to { transform: translate3d(2%, 2%, 0) rotate(0.6deg); }
    }

    .decor-layer,
    .view {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .view {
      z-index: 4;
      padding: clamp(30px, 4.2vw, 58px) clamp(28px, 5vw, 74px);
      transition: opacity 520ms var(--ease), transform 680ms var(--ease), filter 520ms var(--ease);
    }

    .detail-view {
      padding: clamp(54px, 6.4vw, 78px) clamp(150px, 16vw, 210px) clamp(54px, 6.6vw, 74px);
    }

    .home-view,
    .detail-view {
      pointer-events: none;
    }

    .home-view.is-active,
    .detail-view.is-active {
      pointer-events: auto;
    }

    .detail-view {
      opacity: 0;
      transform: translateY(26px) scale(0.985);
      filter: blur(6px);
    }

    .app.is-detail .home-view {
      opacity: 0;
      transform: translateY(-22px) scale(0.985);
      filter: blur(5px);
    }

    .app.is-detail .detail-view {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .asset {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
      transition: transform 780ms var(--ease), opacity 620ms var(--ease), filter 620ms var(--ease);
      will-change: transform, opacity;
    }

    .asset.hole-paper {
      top: -3.5%;
      left: 7%;
      width: clamp(420px, 48%, 570px);
      height: 13%;
      background-image: var(--asset-hole-paper);
      transform: rotate(-4deg);
      opacity: 0.58;
    }

    .asset.hand-gray {
      top: 2.2%;
      left: -4%;
      width: clamp(300px, 38%, 460px);
      height: 16%;
      background-image: var(--asset-hand-gray);
      opacity: 0.36;
      transform: rotate(-5deg);
    }

    .asset.hand-blue {
      right: 2.5%;
      bottom: 12%;
      width: clamp(330px, 42%, 500px);
      height: 18%;
      background-image: var(--asset-hand-blue);
      opacity: 0.60;
      transform: rotate(-5deg);
    }

    .asset.tape-long {
      right: 18%;
      top: 11%;
      width: clamp(150px, 21%, 252px);
      height: 7.35%;
      background-image: var(--asset-tape-long);
      transform: rotate(-7deg);
      opacity: 0.62;
    }

    .asset.tape-short {
      left: 7%;
      bottom: 22%;
      width: clamp(72px, 9.45%, 114px);
      height: 6.3%;
      background-image: var(--asset-tape-short);
      transform: rotate(84deg);
      opacity: 0.56;
    }

    .asset.note-long {
      left: 50%;
      top: 19%;
      width: clamp(260px, 28%, 336px);
      height: 8%;
      background-image: var(--asset-note-long);
      transform: translateX(-50%) rotate(-2deg);
      opacity: 0.44;
    }

    .app.is-detail .asset.hole-paper,
    .app.is-detail .asset.hand-gray,
    .app.is-detail .asset.tape-long,
    .app.is-detail .asset.note-long {
      transform: translateY(-48px) rotate(-5deg);
      opacity: 0.16;
      filter: blur(1.2px);
    }

    .app.is-detail .asset.hand-blue,
    .app.is-detail .asset.tape-short {
      transform: translateY(52px) rotate(-7deg);
      opacity: 0.18;
      filter: blur(1.2px);
    }

    .topbar {
      position: absolute;
      z-index: 30;
      top: clamp(16px, 2.1vw, 28px);
      right: clamp(18px, 2.4vw, 34px);
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .text-btn,
    .icon-btn {
      min-height: 36px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.62);
      color: var(--ink);
      border-radius: 999px;
      box-shadow: 0 8px 18px rgba(35, 48, 58, 0.09);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      transition: transform 200ms ease, background 220ms ease, border-color 220ms ease;
      font-family: var(--font-ui);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .text-btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.80);
    }

    .text-btn {
      padding: 0 14px;
    }

    .icon-action-btn {
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.64);
      color: var(--blue-deep);
      box-shadow: 0 8px 18px rgba(35, 48, 58, 0.09);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      transition: transform 200ms ease, background 220ms ease, border-color 220ms ease;
    }

    .icon-action-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.85;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-action-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.82);
    }

    .home-inner {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .home-center {
      position: absolute;
      left: 50%;
      top: 30.6%;
      z-index: 5;
      width: min(760px, 88%);
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      text-align: center;
      animation: homeIntro 820ms var(--ease) both;
    }

    @keyframes homeIntro {
      from {
        opacity: 0;
        transform: translate(-50%, calc(-50% + 18px)) scale(0.985);
        filter: blur(5px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        filter: blur(0);
      }
    }

    .kicker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--blue-deep);
      font-family: var(--font-ui);
      font-size: clamp(10px, 0.9vw, 12px);
      letter-spacing: 0.38em;
      text-transform: uppercase;
    }

    .kicker::before,
    .kicker::after {
      content: "";
      width: 42px;
      height: 1px;
      background: currentColor;
      opacity: 0.64;
    }

    .main-title {
      min-width: 8ch;
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(34px, min(6.2vw, 8.4vh), 82px);
      line-height: 1.05;
      font-weight: normal;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.42);
      outline: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .intro {
      max-width: 560px;
      margin: 22px auto 10px;
      color: var(--soft-ink);
      font-size: clamp(12px, min(1.35vw, 2.3vh), 17px);
      line-height: 1.85;
      letter-spacing: 0.05em;
      outline: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .home-actions {
      position: absolute;
      bottom: clamp(16px, 2.5vw, 26px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    .add-btn {
      position: relative;
      min-width: min(82vw, 390px);
      min-height: clamp(38px, 5vh, 48px);
      padding: 0 clamp(18px, 2.5vw, 30px);
      border-radius: 999px;
      color: var(--blue-deep);
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid rgba(95, 139, 166, 0.24);
      box-shadow: 0 12px 30px rgba(52, 75, 90, 0.11);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      font-size: clamp(12px, min(1.18vw, 2.2vh), 15px);
      letter-spacing: 0.14em;
      white-space: nowrap;
      transition: transform 220ms var(--ease), box-shadow 220ms ease, background 220ms ease;
    }

    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(52, 75, 90, 0.16);
      background: rgba(255, 255, 255, 0.82);
    }

    .add-btn::before,
    .add-btn::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 8vw;
      max-width: 92px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      opacity: 0.7;
    }

    .add-btn::before { right: calc(100% + 14px); }
    .add-btn::after { left: calc(100% + 14px); }

    .add-symbol {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      margin-right: 10px;
      border-radius: 50%;
      background: rgba(95, 139, 166, 0.16);
      font-family: var(--font-ui);
      font-size: 18px;
      vertical-align: -2px;
    }

    .module-area {
      position: absolute;
      left: clamp(28px, 5vw, 74px);
      right: clamp(28px, 5vw, 74px);
      bottom: clamp(112px, 12vw, 168px);
      z-index: 1;
      height: min(27.5%, 210px);
      min-height: 0;
      padding: 4px 4px 12px;
      overflow: hidden;
      animation: cardAreaIn 900ms var(--ease) 240ms both;
    }

    @keyframes cardAreaIn {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .module-scroll {
      height: 100%;
      overflow: auto;
      padding: 8px 8px 18px 2px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: rgba(95, 139, 166, 0.44) transparent;
    }

    .module-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(12px, 1.65vw, 22px);
      align-content: start;
    }

    .scene-card {
      position: relative;
      z-index: 10;
      min-height: clamp(112px, 14vw, 136px);
      padding: clamp(14px, 1.8vw, 23px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      text-align: left;
      border: 1px solid rgba(102, 122, 138, 0.12);
      border-radius: 3px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.58)),
        var(--asset-paper) center / 120% 120% no-repeat;
      box-shadow: var(--small-shadow);
      transform-origin: center;
      transition: transform 240ms var(--ease), box-shadow 240ms var(--ease), filter 240ms ease;
      isolation: isolate;
      pointer-events: auto;
    }

    .scene-card:hover {
      transform: translateY(-5px) rotate(-0.5deg);
      box-shadow: 0 18px 38px rgba(44, 57, 68, 0.16);
    }

    .scene-card::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -16px;
      width: 46.2%;
      height: 42px;
      transform: translateX(-50%) rotate(-3deg);
      background: var(--asset-tape-short) center / contain no-repeat;
      opacity: 0.55;
      z-index: 0;
      pointer-events: none;
    }

    .scene-card::after {
      content: attr(data-count);
      position: absolute;
      right: 18px;
      bottom: 16px;
      color: rgba(95, 139, 166, 0.28);
      font-family: var(--font-ui);
      font-size: clamp(30px, 4vw, 46px);
      font-weight: normal;
      letter-spacing: -0.08em;
      z-index: -1;
      pointer-events: none;
    }

    .scene-card > * {
      position: relative;
      z-index: 1;
      pointer-events: none;
    }

    .scene-meta-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 11px;
      color: var(--blue-deep);
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .scene-card h2 {
      margin: 0 0 10px;
      font-family: var(--font-title);
      font-size: clamp(20px, 2.2vw, 30px);
      line-height: 1.25;
      font-weight: normal;
      letter-spacing: 0.05em;
    }

    .scene-card p {
      margin: 0;
      color: var(--soft-ink);
      font-size: clamp(12px, min(1.18vw, 2.2vh), 15px);
      line-height: 1.75;
      letter-spacing: 0.035em;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }

    .detail-shell {
      width: 100%;
      max-width: 720px;
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(8px, 1.2vw, 14px);
      position: relative;
    }

    .detail-header {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 14px;
      padding-right: 0;
    }

    .back-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid var(--line);
      box-shadow: var(--small-shadow);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      color: var(--blue-deep);
      font-size: 20px;
    }

    .detail-label {
      justify-self: start;
      min-height: 38px;
      padding: 9px 20px;
      background: var(--asset-note-long) center / 100% 100% no-repeat;
      color: var(--blue-deep);
      font-family: var(--font-ui);
      font-size: clamp(11px, 0.98vw, 13px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .status {
      display: none;
    }

    .editor-card {
      min-height: 0;
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(12px, 1.45vw, 18px);
      padding: clamp(24px, 3.2vw, 42px);
      border: 1px solid rgba(102, 122, 138, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.58)),
        var(--asset-paper) center / 100% 100% no-repeat;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .editor-card::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -22px;
      width: min(360px, 40%);
      height: 64px;
      transform: translateX(-50%) rotate(-2deg);
      background: var(--asset-tape-long) center / contain no-repeat;
      opacity: 0.38;
      pointer-events: none;
    }

    .editor-top {
      position: relative;
      display: grid;
      grid-template-columns: 1fr minmax(170px, 22%);
      gap: clamp(14px, 2vw, 24px);
      align-items: start;
      z-index: 1;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--blue-deep);
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
    }

    .input,
    .textarea {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      resize: none;
    }

    .title-input {
      min-height: 56px;
      font-family: var(--font-title);
      font-size: clamp(32px, 4.2vw, 62px);
      line-height: 1.15;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--line);
    }

    .meta-panel {
      display: grid;
      gap: 10px;
      padding-top: 7px;
    }

    .meta-input {
      min-height: 34px;
      padding: 0 2px 7px;
      border-bottom: 1px solid var(--line);
      color: var(--soft-ink);
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    .body-wrap {
      position: relative;
      min-height: 0;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .summary-input {
      min-height: 54px;
      line-height: 1.7;
      color: var(--soft-ink);
      font-size: clamp(13px, 1.12vw, 15px);
      padding: 4px clamp(6px, 0.8vw, 12px) 12px;
      border-bottom: 1px solid var(--line);
    }

    .scroll-editor {
      min-height: 0;
      overflow: hidden;
      border-radius: 10px;
      border: 1px solid rgba(104, 130, 148, 0.10);
      background:
        repeating-linear-gradient(0deg, transparent 0, transparent 35px, rgba(95, 139, 166, 0.10) 36px),
        rgba(255, 255, 255, 0.18);
    }

    .body-input {
      height: 100%;
      min-height: 220px;
      overflow: auto;
      padding: 14px clamp(16px, 2vw, 24px) 22px;
      -webkit-overflow-scrolling: touch;
      line-height: 1.85;
      font-size: clamp(13px, 1.12vw, 16px);
      letter-spacing: 0.045em;
      scrollbar-width: thin;
      scrollbar-color: rgba(95, 139, 166, 0.50) transparent;
    }

    .detail-actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      min-height: 38px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid var(--line);
      color: var(--blue-deep);
      box-shadow: 0 8px 18px rgba(35, 48, 58, 0.08);

          {

      var moduleGrid = document.getElementById('moduleGrid');

      var mainIntro = document.getElementById('mainIntro');

      var bgmAudio = document.getElementById('bgmAudio');

        init();

        console.error('Init failed, fallback render module cards.', error);

      function init() {
        setAppHeight();
        preloadLocalAssets();
        renderMeta();
        syncToolControls();
        renderCards();
        bindEvents();
        if (currentId) fillEditor(currentId);
        updateStatus(STATUS.saved);
        loadOfficialScenes();
      }

      function preloadLocalAssets() {
        var urls = [
          './assets/1.png', './assets/2.png', './assets/3.png', './assets/4.png', './assets/5.png',
          './assets/6.png', './assets/7.png', './assets/8.png', './assets/9.png', './assets/10.png'
        ];
        var failed = false;
        var finished = 0;

        function done(hasFailed) {
          failed = failed || hasFailed;
          finished += 1;
          if (failed && app) app.classList.add('assets-fallback');
          if (finished === urls.length && !failed && app) app.classList.remove('assets-fallback');
        }

        urls.forEach(function (url) {
          var img = new Image();
          img.onload = function () { done(false); };
          img.onerror = function () { done(true); };
          img.src = url;
        });
      }

      function bindEvents() {
        if (searchInput) {
          searchInput.oninput = function () {
            uiState.query = searchInput.value || '';
            renderCards();
          };
        }

        if (sortSelect) {
          sortSelect.onchange = function () {
            uiState.sort = sortSelect.value || 'updatedDesc';
            renderCards();
          };
        }

        if (musicBtn && bgmAudio) {
          musicBtn.onclick = toggleMusic;
          bgmAudio.onended = function () { updateMusicButton(false); };
          bgmAudio.onerror = function () { updateMusicButton(false); };
        }

        addBtn.onclick = function () {
          var scene = createScene();
          state.scenes.unshift(scene);
          currentId = scene.id;
          commitSave('新笺已收入纸间');
          renderCards();
          openDetail(scene.id);
        };

        newFromDetailBtn.onclick = function () {
          var scene = createScene();
          state.scenes.unshift(scene);
          currentId = scene.id;
          fillEditor(scene.id);
          commitSave('新笺已收入纸间');
          renderCards();
        };

        backBtn.onclick = requestCloseDetail;
        saveBtn.onclick = function () { commitSave('墨迹已干'); };
        copyBtn.onclick = copyCurrentBody;
        modalSaveCloseBtn.onclick = function () {
          commitSave('墨迹已干');
          hideSavePrompt();
          closeDetail();
        };
        modalCloseBtn.onclick = function () {
          hideSavePrompt();
          closeDetail();
        };
        modalCancelBtn.onclick = hideSavePrompt;
        saveModal.onclick = function (event) {
          if (event.target === saveModal) hideSavePrompt();
        };

        deleteBtn.onclick = function () {
          if (!currentId) return;
          var scene = getScene(currentId);
          if (!scene) return;
          if (!window.confirm('确认删除当前小剧场吗？此操作只会删除本地缓存中的这一条。')) return;
          if (scene.source === OFFICIAL_SOURCE) {
            scene.deletedAt = nowISO();
            scene.editedLocally = true;
            scene.updatedAt = nowISO();
          } else {
            state.scenes = state.scenes.filter(function (item) { return item.id !== scene.id; });
          }
          currentId = firstAvailableSceneId();
          commitSave('已删除');
          closeDetail();
        };

        Object.keys(fields).forEach(function (key) {
          var el = fields[key];
          el.oninput = function () {
            updateCurrentScene(key, el.value);
            if (key === 'body') autoResizeBodyInput();
            hasUnsavedChanges = true;
            renderCards();
            queueSave();
          };
        });

        exportBtn.onclick = exportJSON;
        importBtn.onclick = function () { importFile.value = ''; importFile.click(); };
        importFile.onchange = importJSON;

        window.addEventListener('keydown', function (event) {
          var key = String(event.key || '').toLowerCase();
          if ((event.ctrlKey || event.metaKey) && key === 's') {
            event.preventDefault();
            commitSave('墨迹已干');
          }
          if (event.key === 'Escape' && app.classList.contains('is-detail')) requestCloseDetail();
        });

        window.addEventListener('beforeunload', function (event) {
          if (!hasUnsavedChanges) return;
          try { saveStateSilent(); } catch (error) {}
          event.preventDefault();
          event.returnValue = '';
        });
      }

      function renderMeta() {
        mainTitle.textContent = defaultState.meta.title;
        mainIntro.textContent = defaultState.meta.intro;
      }

      function renderCards() {
        if (!moduleGrid) return;
        moduleGrid.innerHTML = '';
        var scenes = getVisibleScenes();
        var fragment = document.createDocumentFragment();

        if (!scenes.length) {
          renderEmptyCard(moduleGrid);
          return;
        }

        scenes.forEach(function (scene, index) {
          var card = document.createElement('article');
          card.className = 'scene-card' + (scene.pinned ? ' is-pinned' : '') + (scene.favorite ? ' is-favorite' : '');
          card.setAttribute('data-count', twoDigits(index + 1));
          card.setAttribute('tabindex', '0');
          card.setAttribute('role', 'button');
          card.setAttribute('aria-label', '打开小剧场：' + (scene.title || '未命名小剧场'));

          card.innerHTML =
            '<div class="card-actions">' +
              '<button class="card-action-btn fav-btn' + (scene.favorite ? ' is-on' : '') + '" type="button" title="收藏" aria-label="收藏" aria-pressed="' + String(!!scene.favorite) + '">' + favoriteIcon(scene.favorite) + '</button>' +
              '<button class="card-action-btn pin-btn' + (scene.pinned ? ' is-on' : '') + '" type="button" title="置顶" aria-label="置顶" aria-pressed="' + String(!!scene.pinned) + '">' + pinIcon(scene.pinned) + '</button>' +
            '</div>' +
            '<div class="scene-meta-line"><span>' + escapeHTML(scene.type || '未分类') + '</span><span>' + escapeHTML(scene.date || '') + '</span></div>' +
            '<h2>' + escapeHTML(scene.title || '未命名小剧场') + '</h2>' +
            '<p>' + escapeHTML(scene.summary || scene.body || '点击进入，写下一段新的平行小剧场。') + '</p>';

          card.onclick = function () { openDetail(scene.id); };
          card.onkeydown = function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              openDetail(scene.id);
            }
          };

          var pinBtn = card.querySelector('.pin-btn');
          var favBtn = card.querySelector('.fav-btn');

          if (pinBtn) {
            pinBtn.onclick = function (event) {
              event.stopPropagation();
              toggleSceneFlag(scene.id, 'pinned');
            };
          }
          if (favBtn) {
            favBtn.onclick = function (event) {
              event.stopPropagation();
              toggleSceneFlag(scene.id, 'favorite');
            };
          }

          fragment.appendChild(card);
        });

        moduleGrid.appendChild(fragment);
        if (moduleGrid.children.length === 0) emergencyRenderCards();
      }

      function renderEmptyCard(grid) {
        var card = document.createElement('article');
        card.className = 'scene-card';
        card.setAttribute('data-count', '+');
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'button');

        if ((uiState.query || '').trim()) {
          card.innerHTML =
            '<div class="scene-meta-line"><span>Search</span><span>None</span></div>' +
            '<h2>没有找到对应纸笺</h2>' +
            '<p class="empty-note">可以换一个关键词，或清空“寻笺”重新查看。</p>';
          card.onclick = function () {
            uiState.query = '';
            syncToolControls();
            renderCards();
          };
        } else {
          card.innerHTML =
            '<div class="scene-meta-line"><span>New Scene</span><span>Now</span></div>' +
            '<h2>暂无小剧场</h2>' +
            '<p>点击这里，新增一段平行小剧场。</p>';
          card.onclick = function () {
            var scene = createScene();
            state.scenes.unshift(scene);
            currentId = scene.id;
            commitSave('新笺已收入纸间');
            renderCards();
            openDetail(scene.id);
          };
        }
        grid.appendChild(card);
      }

      function getVisibleScenes() {
        var query = normalizeKeyword(uiState.query);
        var scenes = state.scenes.filter(function (scene) {
          if (scene.deletedAt) return false;
          if (!query) return true;
          return normalizeKeyword([scene.title, scene.type, scene.date, scene.summary, scene.body].join(' ')).indexOf(query) !== -1;
        });

        scenes.sort(function (a, b) {
          if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
          if (uiState.sort === 'favoriteFirst') {
            if (!!a.favorite !== !!b.favorite) return a.favorite ? -1 : 1;
            return compareTime(b.updatedAt, a.updatedAt);
          }
          if (uiState.sort === 'titleAsc') return compareText(a.title, b.title) || compareTime(b.updatedAt, a.updatedAt);
          return compareTime(b.updatedAt, a.updatedAt);
        });

        return scenes;
      }

      function syncToolControls() {
        if (searchInput) searchInput.value = uiState.query || '';
        if (sortSelect) sortSelect.value = uiState.sort || 'updatedDesc';
      }

      function favoriteIcon(active) {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><polygon class="star-shape" points="12 3.8 14.6 9.1 20.5 10 16.2 14.1 17.2 20 12 17.2 6.8 20 7.8 14.1 3.5 10 9.4 9.1 12 3.8"></polygon></svg>';
      }

      function pinIcon(active) {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path class="pin-head" d="M9 4h6l-1 5 4 4v2H6v-2l4-4-1-5z"></path><path d="M12 15v5"></path></svg>';
      }

      function toggleMusic() {
        if (!bgmAudio) return;
        if (!bgmAudio.paused) {
          bgmAudio.pause();
          updateMusicButton(false);
          showToast('背景音乐已暂停');
          return;
        }
        var playPromise = bgmAudio.play();
        if (playPromise && typeof playPromise.then === 'function') {
          playPromise.then(function () {
            updateMusicButton(true);
            showToast('背景音乐已开启');
          }).catch(function () {
            updateMusicButton(false);
            showToast('未找到背景音乐文件');
          });
        } else {
          updateMusicButton(true);
          showToast('背景音乐已开启');
        }
      }

      function updateMusicButton(isPlaying) {
        if (!musicBtn) return;
        musicBtn.classList.toggle('is-playing', !!isPlaying);
        musicBtn.setAttribute('aria-label', isPlaying ? '暂停背景音乐' : '播放背景音乐');
        musicBtn.setAttribute('title', isPlaying ? '暂停背景音乐' : '背景音乐');
      }

      function twoDigits(value) {
        value = String(value);
        return value.length < 2 ? '0' + value : value;
      }

      function emergencyRenderCards() {
        var grid = document.getElementById('moduleGrid');
        if (!grid) return;
        var rescueApp = document.getElementById('app');
        var scenes = defaultState && defaultState.scenes ? defaultState.scenes : [];
        grid.innerHTML = '';
        for (var i = 0; i < scenes.length; i += 1) {
          var scene = normalizeScene(scenes[i]);
          var card = document.createElement('article');
          card.className = 'scene-card';
          card.setAttribute('data-count', twoDigits(i + 1));
          card.innerHTML =
            '<div class="scene-meta-line"><span>' + escapeHTML(scene.type || '未分类') + '</span><span>' + escapeHTML(scene.date || '') + '</span></div>' +
            '<h2>' + escapeHTML(scene.title || '未命名小剧场') + '</h2>' +
            '<p>' + escapeHTML(scene.summary || scene.body || '点击进入，写下一段新的平行小剧场。') + '</p>';
          grid.appendChild(card);
        }
        if (rescueApp && rescueApp.className.indexOf('module-rescue') === -1) rescueApp.className += ' module-rescue';
      }

      function openDetail(id) {
        var scene = getScene(id);
        if (!scene || scene.deletedAt) return;
        currentId = id;
        fillEditor(id);
        app.classList.add('is-detail');
        homeView.classList.remove('is-active');
        detailView.classList.add('is-active');
        setTimeout(autoResizeBodyInput, 40);
      }

      function requestCloseDetail() {
        if (hasUnsavedChanges) {
          showSavePrompt();
          return;
        }
        closeDetail();
      }

      function showSavePrompt() {
        saveModal.classList.add('show');
        saveModal.setAttribute('aria-hidden', 'false');
      }

      function hideSavePrompt() {
        saveModal.classList.remove('show');
        saveModal.setAttribute('aria-hidden', 'true');
      }

      function closeDetail() {
        app.classList.remove('is-detail');
        detailView.classList.remove('is-active');
        homeView.classList.add('is-active');
        renderCards();
      }

      function copyCurrentBody() {
        var scene = getScene(currentId);
        var text = scene && scene.body ? scene.body : fields.body.value || '';
        if (!text.trim()) {
          showToast('正文为空');
          return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            showToast('已复制');
          }).catch(function () {
            fallbackCopy(text);
          });
        } else {
          fallbackCopy(text);
        }
      }

      function fallbackCopy(text) {
        var temp = document.createElement('textarea');
        temp.value = text;
        temp.setAttribute('readonly', '');
        temp.style.position = 'fixed';
        temp.style.left = '0';
        temp.style.top = '0';
        temp.style.width = '1px';
        temp.style.height = '1px';
        temp.style.opacity = '0';
        temp.style.fontSize = '16px';
        document.body.appendChild(temp);
        temp.focus();
        temp.select();
        try { temp.setSelectionRange(0, temp.value.length); } catch (error) {}
        try {
          document.execCommand('copy');
          showToast('已复制');
        } catch (error) {
          showToast('复制失败，请手动复制');
        }
        removeNode(temp);
      }


      function isMobileDetailLayout() {
        return !!(window.matchMedia && window.matchMedia('(max-width: 900px)').matches);
      }

      function autoResizeBodyInput() {
        if (!fields || !fields.body) return;

        /* v5：详情页恢复为容器内部滚动。
           不再给正文 textarea 写入 scrollHeight 高度，避免移动端背景和外层容器被长正文撑开。 */
        fields.body.style.height = '';
        fields.body.style.overflowY = '';
      }

      function fillEditor(id) {
        var scene = getScene(id);
        if (!scene) return;
        fields.title.value = scene.title || '';
        fields.type.value = scene.type || '';
        fields.date.value = scene.date || '';
        fields.summary.value = scene.summary || '';
        fields.body.value = scene.body || '';
        autoResizeBodyInput();
        updateStatus(STATUS.saved);
      }

      function updateCurrentScene(key, value) {
        var scene = getScene(currentId);
        if (!scene || scene.deletedAt) return;
        scene[key] = value;
        if (scene.source === OFFICIAL_SOURCE) scene.editedLocally = true;
        scene.updatedAt = nowISO();
        updateStatus(STATUS.editing);
      }

      function toggleSceneFlag(id, key) {
        var scene = getScene(id);
        if (!scene || scene.deletedAt) return;
        scene[key] = !scene[key];
        scene.updatedAt = nowISO();
        commitSave(key === 'pinned' ? (scene[key] ? '已置顶' : '已取消置顶') : (scene[key] ? '已收藏' : '已取消收藏'));
        renderCards();
      }

      function getScene(id) {
        for (var i = 0; i < state.scenes.length; i++) {
          if (state.scenes[i].id === id) return state.scenes[i];
        }
        return null;
      }

      function firstAvailableSceneId() {
        if (!state || !Array.isArray(state.scenes)) return null;
        for (var i = 0; i < state.scenes.length; i += 1) {
          if (!state.scenes[i].deletedAt) return state.scenes[i].id;
        }
        return state.scenes.length ? state.scenes[0].id : null;
      }

      function createScene() {
        var now = new Date();
        var month = String(now.getMonth() + 1).padStart(2, '0');
        var day = String(now.getDate()).padStart(2, '0');
        var createdAt = now.toISOString();
        return {
          id: makeId(),
          source: USER_SOURCE,
          officialVersion: '',
          editedLocally: true,
          title: '未命名小剧场',
          type: '新收录',
          date: month + '.' + day,
          summary: '',
          body: '在这里写下一段新的平行小剧场。',
          favorite: false,
          pinned: false,
          deletedAt: null,
          createdAt: createdAt,
          updatedAt: createdAt
        };
      }

      function queueSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(function () { commitSave('墨迹已干', false); }, 520);
      }

      function commitSave(message, show) {
        if (message === undefined) message = '墨迹已干';
        if (show === undefined) show = true;
        try {
          saveStateSilent();
          updateStatus(STATUS.saved);
          hasUnsavedChanges = false;
          if (show) showToast(message);
        } catch (error) {
          console.error(error);
          updateStatus(STATUS.failed);
          showToast('本地保存失败，请导出备份');
        }
      }

      function saveStateSilent() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          meta: Object.assign({}, defaultState.meta),
          officialVersion: state.officialVersion || defaultState.officialVersion || '',
          officialSyncedAt: state.officialSyncedAt || '',
          scenes: (state.scenes || []).map(normalizeScene)
        }));
      }

      function loadState() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
          if (!raw) return cloneWithDefaults(defaultState);
          var parsed = JSON.parse(raw);
          var scenes = Array.isArray(parsed) ? parsed : parsed.scenes;
          if (!Array.isArray(scenes)) throw new Error('Invalid data');
          return {
            meta: Object.assign({}, defaultState.meta),
            officialVersion: parsed.officialVersion || defaultState.officialVersion || '',
            officialSyncedAt: parsed.officialSyncedAt || '',
            scenes: scenes.map(normalizeScene)
          };
        } catch (error) {
          console.warn('Load failed, use default state.', error);
          return cloneWithDefaults(defaultState);
        }
      }

      function cloneWithDefaults(value) {
        return {
          meta: Object.assign({}, defaultState.meta),
          officialVersion: value.officialVersion || defaultState.officialVersion || '',
          officialSyncedAt: '',
          scenes: (value.scenes || []).map(normalizeScene)
        };
      }

      function normalizeScene(item) {
        item = item || {};
        var stamp = item.createdAt || item.updatedAt || nowISO();
        var source = item.source === OFFICIAL_SOURCE ? OFFICIAL_SOURCE : USER_SOURCE;
        return {
          id: item.id || makeId(),
          source: source,
          officialVersion: item.officialVersion || '',
          title: item.title || '未命名小剧场',
          type: item.type || '未分类',
          date: item.date || '',
          summary: item.summary || '',
          body: item.body || '',
          favorite: !!item.favorite,
          pinned: !!item.pinned,
          deletedAt: item.deletedAt || null,
          editedLocally: !!item.editedLocally,
          createdAt: item.createdAt || stamp,
          updatedAt: item.updatedAt || stamp
        };
      }

      function loadOfficialScenes() {
        if (!window.fetch) return;
        var separator = OFFICIAL_SCENES_URL.indexOf('?') === -1 ? '?' : '&';
        fetch(OFFICIAL_SCENES_URL + separator + 't=' + Date.now(), { cache: 'no-store' })
          .then(function (response) {
            if (!response.ok) throw new Error('Official scenes unavailable');
            return response.json();
          })
          .then(function (data) {
            if (!data || !Array.isArray(data.scenes)) throw new Error('Invalid official scenes');
            mergeOfficialScenes(data);
            currentId = currentId || firstAvailableSceneId();
            renderCards();
            if (currentId && app.classList.contains('is-detail')) fillEditor(currentId);
            commitSave('作者纸笺已同步', false);
          })
          .catch(function (error) {
            console.warn('Official scenes sync skipped.', error);
          });
      }

      function mergeOfficialScenes(data) {
        var version = String(data.version || data.presetVersion || defaultState.officialVersion || '');
        var existingById = {};
        var next = [];
        var officialIds = {};

        (state.scenes || []).forEach(function (scene) {
          if (scene && scene.id) existingById[scene.id] = normalizeScene(scene);
        });

        data.scenes.forEach(function (item) {
          var official = normalizeScene(Object.assign({}, item, {
            id: item.id || makeId(),
            source: OFFICIAL_SOURCE,
            officialVersion: version,
            editedLocally: false
          }));
          officialIds[official.id] = true;

          var local = existingById[official.id];
          if (local && local.source === OFFICIAL_SOURCE && local.editedLocally) {
            local.officialVersion = version;
            next.push(local);
            return;
          }

          if (local) {
            official.favorite = !!local.favorite;
            official.pinned = !!local.pinned;
            official.deletedAt = local.source === OFFICIAL_SOURCE ? local.deletedAt : null;
            official.createdAt = local.createdAt || official.createdAt;
          }

          next.push(official);
        });

        (state.scenes || []).forEach(function (scene) {
          scene = normalizeScene(scene);
          if (officialIds[scene.id]) return;
          if (scene.source === OFFICIAL_SOURCE && !scene.editedLocally) return;
          if (scene.source === OFFICIAL_SOURCE && scene.editedLocally) scene.source = USER_SOURCE;
          next.push(scene);
        });

        state.officialVersion = version;
        state.officialSyncedAt = nowISO();
        state.scenes = next.map(normalizeScene);
      }

      function exportJSON() {
        var data = JSON.stringify(state, null, 2);
        var blob = new Blob([data], { type: 'application/json;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var date = new Date().toISOString().slice(0, 10);
        var filename = 'zhizhi-theater-backup-' + date + '.json';

        if (isIOSLike()) {
          var opened = window.open(url, '_blank');
          if (!opened) window.location.href = url;
          showToast('iOS 已打开备份，请用分享保存');
          setTimeout(function () { URL.revokeObjectURL(url); }, 6000);
          return;
        }

        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        removeNode(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1200);
        showToast('JSON 已导出');
      }

      function importJSON(event) {
        var file = event.target.files && event.target.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function () {
          try {
            var parsed = JSON.parse(String(reader.result));
            var scenes = Array.isArray(parsed) ? parsed : parsed.scenes;
            if (!Array.isArray(scenes)) throw new Error('Invalid JSON');

            var shouldReplace = window.confirm('导入后将替换当前本地内容。建议先导出现有 JSON 备份。确认继续吗？');
            if (!shouldReplace) return;

            state = {
              meta: Object.assign({}, defaultState.meta),
              officialVersion: parsed.officialVersion || state.officialVersion || defaultState.officialVersion || '',
              officialSyncedAt: state.officialSyncedAt || '',
              scenes: scenes.map(normalizeScene)
            };
            currentId = firstAvailableSceneId();
            uiState.query = '';
            uiState.sort = 'updatedDesc';
            syncToolControls();
            renderMeta();
            renderCards();
            if (currentId) fillEditor(currentId);
            commitSave('JSON 已导入并保存');
          } catch (error) {
            console.error(error);
            showToast('导入失败，请检查 JSON 格式');
          } finally {
            importFile.value = '';
          }
        };
        reader.readAsText(file, 'utf-8');
      }

      function updateStatus(text) {
        if (statusText) statusText.textContent = text;
      }

      function showToast(message, actionLabel, action) {
        clearTimeout(showToast.timer);
        toast.innerHTML = '';
        var textNode = document.createElement('span');
        textNode.textContent = message;
        toast.appendChild(textNode);
        if (actionLabel && typeof action === 'function') {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'toast-action';
          btn.textContent = actionLabel;
          btn.onclick = function (event) {
            event.stopPropagation();
            toast.classList.remove('show');
            action();
          };
          toast.appendChild(btn);
          showToast.timer = setTimeout(function () { toast.classList.remove('show'); }, 4200);
        } else {
          showToast.timer = setTimeout(function () { toast.classList.remove('show'); }, 1500);
        }
        toast.classList.add('show');
      }

      function normalizeKeyword(value) {
        return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
      }

      function compareTime(a, b) {
        return new Date(a || 0).getTime() - new Date(b || 0).getTime();
      }

      function compareText(a, b) {
        return String(a || '').localeCompare(String(b || ''), 'zh-Hans-CN');
      }

      function formatShortDate(value) {
        if (!value) return '';
        var date = new Date(value);
        if (isNaN(date.getTime())) return '';
        return String(date.getMonth() + 1).padStart(2, '0') + '.' + String(date.getDate()).padStart(2, '0');
      }

      function escapeHTML(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    })();
  </script>
</body>
</html>
