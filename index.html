<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fontsapi.zeoseven.com" crossorigin />
  <link rel="preconnect" href="https://fontsapi-storage.zeoseven.com" crossorigin />
  <title>吱吱的剧笺手札</title>

  <style>
    @import url("https://fontsapi.zeoseven.com/441/main/result.css");
    @import url("https://fontsapi.zeoseven.com/646/main/result.css");

    :root {
      --app-height: 100vh;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --home-bg: url('./assets/1.png');
      --detail-bg: url('./assets/2.png');
      --asset-hole-paper: url('./assets/3.png');
      --asset-paper: url('./assets/4.png');
      --asset-tape-long: url('./assets/5.png');
      --asset-tape-short: url('./assets/6.png');
      --asset-hand-blue: url('./assets/7.png');
      --asset-hand-gray: url('./assets/8.png');
      --asset-note-long: url('./assets/9.png');
      --asset-note-short: url('./assets/10.png');

      --font-title: "JiangChengJieXingTi", "JiangChengJieXingTi-Regular", "Kaiti SC", "STKaiti", "Songti SC", "Noto Serif SC", "STSong", "SimSun", serif;
      --font-body: "XiangcuiDengcusong", "XiangcuiDengcusong-Regular", "Songti SC", "Noto Serif SC", "STSong", "SimSun", serif;
      --font-ui: "XiangcuiDengcusong", "XiangcuiDengcusong-Regular", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

      --ink: #222427;
      --muted: #7d858e;
      --soft-ink: rgba(34, 36, 39, 0.70);
      --blue: #86abc3;
      --blue-deep: #5f8ba6;
      --paper-solid: #fbfbf8;
      --line: rgba(73, 95, 113, 0.16);
      --shadow: 0 18px 48px rgba(45, 57, 68, 0.14);
      --small-shadow: 0 10px 24px rgba(48, 56, 64, 0.11);
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    @supports (height: 100svh) {
      :root { --app-height: 100svh; }
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: normal;
      background: #eef3f5;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: var(--app-height);
      display: grid;
      place-items: center;
      padding: clamp(10px, 2vw, 28px);
    }

    button,
    input,
    textarea {
      font: inherit;
      color: inherit;
      -webkit-font-smoothing: inherit;
    }

    button,
    input,
    textarea {
      -webkit-appearance: none;
      appearance: none;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .app {
      width: min(96vw, 1200px);
      aspect-ratio: 4 / 3;
      position: relative;
      overflow: hidden;
      border-radius: clamp(18px, 2.2vw, 32px);
      background-image: var(--home-bg);
      background-size: cover;
      background-position: center;
      box-shadow: var(--shadow);
      transition: background-image 560ms var(--ease);
      isolation: isolate;
      background-color: #eef3f5;
      transform: translateZ(0);
    }

    .app.is-detail {
      background-image: var(--detail-bg);
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 12% 20%, rgba(255, 255, 255, 0.42), transparent 26%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.03));
      pointer-events: none;
    }

    .geo-bg {
      position: absolute;
      inset: -20%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.32;
      background:
        linear-gradient(135deg, transparent 0 18%, rgba(132, 171, 195, 0.12) 18% 18.8%, transparent 18.8% 42%, rgba(255,255,255,0.28) 42% 42.6%, transparent 42.6% 100%),
        linear-gradient(135deg, transparent 0 58%, rgba(132, 171, 195, 0.10) 58% 58.8%, transparent 58.8% 100%);
      transform: translate3d(-2%, -2%, 0) rotate(0deg);
      animation: driftGeometry 18s linear infinite alternate;
      mix-blend-mode: multiply;
    }

    @keyframes driftGeometry {
      from { transform: translate3d(-2%, -2%, 0) rotate(0deg); }
      to { transform: translate3d(2%, 2%, 0) rotate(0.6deg); }
    }

    .decor-layer,
    .view {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .view {
      z-index: 4;
      padding: clamp(30px, 4.2vw, 58px) clamp(28px, 5vw, 74px);
      transition: opacity 520ms var(--ease), transform 680ms var(--ease), filter 520ms var(--ease);
    }

    .detail-view {
      padding: clamp(54px, 6.4vw, 78px) clamp(150px, 16vw, 210px) clamp(54px, 6.6vw, 74px);
    }

    .home-view,
    .detail-view {
      pointer-events: none;
    }

    .home-view.is-active,
    .detail-view.is-active {
      pointer-events: auto;
    }

    .detail-view {
      opacity: 0;
      transform: translateY(26px) scale(0.985);
      filter: blur(6px);
    }

    .app.is-detail .home-view {
      opacity: 0;
      transform: translateY(-22px) scale(0.985);
      filter: blur(5px);
    }

    .app.is-detail .detail-view {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .asset {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
      transition: transform 780ms var(--ease), opacity 620ms var(--ease), filter 620ms var(--ease);
      will-change: transform, opacity;
    }

    .asset.hole-paper {
      top: -3.5%;
      left: 7%;
      width: clamp(420px, 48%, 570px);
      height: 13%;
      background-image: var(--asset-hole-paper);
      transform: rotate(-4deg);
      opacity: 0.58;
    }

    .asset.hand-gray {
      top: 2.2%;
      left: -4%;
      width: clamp(300px, 38%, 460px);
      height: 16%;
      background-image: var(--asset-hand-gray);
      opacity: 0.36;
      transform: rotate(-5deg);
    }

    .asset.hand-blue {
      right: 2.5%;
      bottom: 12%;
      width: clamp(330px, 42%, 500px);
      height: 18%;
      background-image: var(--asset-hand-blue);
      opacity: 0.60;
      transform: rotate(-5deg);
    }

    .asset.tape-long {
      right: 18%;
      top: 11%;
      width: clamp(150px, 21%, 252px);
      height: 7.35%;
      background-image: var(--asset-tape-long);
      transform: rotate(-7deg);
      opacity: 0.62;
    }

    .asset.tape-short {
      left: 7%;
      bottom: 22%;
      width: clamp(72px, 9.45%, 114px);
      height: 6.3%;
      background-image: var(--asset-tape-short);
      transform: rotate(84deg);
      opacity: 0.56;
    }

    .asset.note-long {
      left: 50%;
      top: 19%;
      width: clamp(260px, 28%, 336px);
      height: 8%;
      background-image: var(--asset-note-long);
      transform: translateX(-50%) rotate(-2deg);
      opacity: 0.44;
    }

    .app.is-detail .asset.hole-paper,
    .app.is-detail .asset.hand-gray,
    .app.is-detail .asset.tape-long,
    .app.is-detail .asset.note-long {
      transform: translateY(-48px) rotate(-5deg);
      opacity: 0.16;
      filter: blur(1.2px);
    }

    .app.is-detail .asset.hand-blue,
    .app.is-detail .asset.tape-short {
      transform: translateY(52px) rotate(-7deg);
      opacity: 0.18;
      filter: blur(1.2px);
    }

    .topbar {
      position: absolute;
      z-index: 30;
      top: clamp(16px, 2.1vw, 28px);
      right: clamp(18px, 2.4vw, 34px);
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .text-btn,
    .icon-btn {
      min-height: 36px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.62);
      color: var(--ink);
      border-radius: 999px;
      box-shadow: 0 8px 18px rgba(35, 48, 58, 0.09);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      transition: transform 200ms ease, background 220ms ease, border-color 220ms ease;
      font-family: var(--font-ui);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .text-btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.80);
    }

    .text-btn {
      padding: 0 14px;
    }

    .icon-action-btn {
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.64);
      color: var(--blue-deep);
      box-shadow: 0 8px 18px rgba(35, 48, 58, 0.09);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      transition: transform 200ms ease, background 220ms ease, border-color 220ms ease;
    }

    .icon-action-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.85;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-action-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.82);
    }

    .home-inner {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .home-center {
      position: absolute;
      left: 50%;
      top: 30.6%;
      z-index: 5;
      width: min(760px, 88%);
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      text-align: center;
      animation: homeIntro 820ms var(--ease) both;
    }

    @keyframes homeIntro {
      from {
        opacity: 0;
        transform: translate(-50%, calc(-50% + 18px)) scale(0.985);
        filter: blur(5px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        filter: blur(0);
      }
    }

    .kicker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--blue-deep);
      font-family: var(--font-ui);
      font-size: clamp(10px, 0.9vw, 12px);
      letter-spacing: 0.38em;
      text-transform: uppercase;
    }

    .kicker::before,
    .kicker::after {
      content: "";
      width: 42px;
      height: 1px;
      background: currentColor;
      opacity: 0.64;
    }

    .main-title {
      min-width: 8ch;
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(34px, min(6.2vw, 8.4vh), 82px);
      line-height: 1.05;
      font-weight: normal;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.42);
      outline: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .intro {
      max-width: 560px;
      margin: 22px auto 10px;
      color: var(--soft-ink);
      font-size: clamp(12px, min(1.35vw, 2.3vh), 17px);
      line-height: 1.85;
      letter-spacing: 0.05em;
      outline: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .home-actions {
      position: absolute;
      bottom: clamp(16px, 2.5vw, 26px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    .add-btn {
      position: relative;
      min-width: min(82vw, 390px);
      min-height: clamp(38px, 5vh, 48px);
      padding: 0 clamp(18px, 2.5vw, 30px);
      border-radius: 999px;
      color: var(--blue-deep);
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid rgba(95, 139, 166, 0.24);
      box-shadow: 0 12px 30px rgba(52, 75, 90, 0.11);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      font-size: clamp(12px, min(1.18vw, 2.2vh), 15px);
      letter-spacing: 0.14em;
      white-space: nowrap;
      transition: transform 220ms var(--ease), box-shadow 220ms ease, background 220ms ease;
    }

    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(52, 75, 90, 0.16);
      background: rgba(255, 255, 255, 0.82);
    }

    .add-btn::before,
    .add-btn::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 8vw;
      max-width: 92px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      opacity: 0.7;
    }

    .add-btn::before { right: calc(100% + 14px); }
    .add-btn::after { left: calc(100% + 14px); }

    .add-symbol {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      margin-right: 10px;
      border-radius: 50%;
      background: rgba(95, 139, 166, 0.16);
      font-family: var(--font-ui);
      font-size: 18px;
      vertical-align: -2px;
    }

    .module-area {
      position: absolute;
      left: clamp(28px, 5vw, 74px);
      right: clamp(28px, 5vw, 74px);
      bottom: clamp(112px, 12vw, 168px);
      z-index: 1;
      height: min(27.5%, 210px);
      min-height: 0;
      padding: 4px 4px 12px;
      overflow: hidden;
      animation: cardAreaIn 900ms var(--ease) 240ms both;
    }

    @keyframes cardAreaIn {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .module-scroll {
      height: 100%;
      overflow: auto;
      padding: 8px 8px 18px 2px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: rgba(95, 139, 166, 0.44) transparent;
    }

    .module-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(12px, 1.65vw, 22px);
      align-content: start;
    }

    .scene-card {
      position: relative;
      z-index: 10;
      min-height: clamp(112px, 14vw, 136px);
      padding: clamp(14px, 1.8vw, 23px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      text-align: left;
      border: 1px solid rgba(102, 122, 138, 0.12);
      border-radius: 3px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.58)),
        var(--asset-paper) center / 120% 120% no-repeat;
      box-shadow: var(--small-shadow);
      transform-origin: center;
      transition: transform 240ms var(--ease), box-shadow 240ms var(--ease), filter 240ms ease;
      isolation: isolate;
      pointer-events: auto;
    }

    .scene-card:hover {
      transform: translateY(-5px) rotate(-0.5deg);
      box-shadow: 0 18px 38px rgba(44, 57, 68, 0.16);
    }

    .scene-card::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -16px;
      width: 46.2%;
      height: 42px;
      transform: translateX(-50%) rotate(-3deg);
      background: var(--asset-tape-short) center / contain no-repeat;
      opacity: 0.55;
      z-index: 0;
      pointer-events: none;
    }

    .scene-card::after {
      content: attr(data-count);
      position: absolute;
      right: 18px;
      bottom: 16px;
      color: rgba(95, 139, 166, 0.28);
      font-family: var(--font-ui);
      font-size: clamp(30px, 4vw, 46px);
      font-weight: normal;
      letter-spacing: -0.08em;
      z-index: -1;
      pointer-events: none;
    }

    .scene-card > * {
      position: relative;
      z-index: 1;
      pointer-events: none;
    }

    .scene-meta-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 11px;
      color: var(--blue-deep);
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .scene-card h2 {
      margin: 0 0 10px;
      font-family: var(--font-title);
      font-size: clamp(20px, 2.2vw, 30px);
      line-height: 1.25;
      font-weight: normal;
      letter-spacing: 0.05em;
    }

    .scene-card p {
      margin: 0;
      color: var(--soft-ink);
      font-size: clamp(12px, min(1.18vw, 2.2vh), 15px);
      line-height: 1.75;
      letter-spacing: 0.035em;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }

    .detail-shell {
      width: 100%;
      max-width: 720px;
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(8px, 1.2vw, 14px);
      position: relative;
    }

    .detail-header {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 14px;
      padding-right: 0;
    }

    .back-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid var(--line);
      box-shadow: var(--small-shadow);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      color: var(--blue-deep);
      font-size: 20px;
    }

    .detail-label {
      justify-self: start;
      min-height: 38px;
      padding: 9px 20px;
      background: var(--asset-note-long) center / 100% 100% no-repeat;
      color: var(--blue-deep);
      font-family: var(--font-ui);
      font-size: clamp(11px, 0.98vw, 13px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .status {
      display: none;
    }

    .editor-card {
      min-height: 0;
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(12px, 1.45vw, 18px);
      padding: clamp(24px, 3.2vw, 42px);
      border: 1px solid rgba(102, 122, 138, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.58)),
        var(--asset-paper) center / 100% 100% no-repeat;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .editor-card::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -22px;
      width: min(360px, 40%);
      height: 64px;
      transform: translateX(-50%) rotate(-2deg);
      background: var(--asset-tape-long) center / contain no-repeat;
      opacity: 0.38;
      pointer-events: none;
    }

    .editor-top {
      position: relative;
      display: grid;
      grid-template-columns: 1fr minmax(170px, 22%);
      gap: clamp(14px, 2vw, 24px);
      align-items: start;
      z-index: 1;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--blue-deep);
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
    }

    .input,
    .textarea {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      resize: none;
    }

    .title-input {
      min-height: 56px;
      font-family: var(--font-title);
      font-size: clamp(32px, 4.2vw, 62px);
      line-height: 1.15;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--line);
    }

    .meta-panel {
      display: grid;
      gap: 10px;
      padding-top: 7px;
    }

    .meta-input {
      min-height: 34px;
      padding: 0 2px 7px;
      border-bottom: 1px solid var(--line);
      color: var(--soft-ink);
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    .body-wrap {
      position: relative;
      min-height: 0;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .summary-input {
      min-height: 54px;
      line-height: 1.7;
      color: var(--soft-ink);
      font-size: clamp(13px, 1.12vw, 15px);
      padding: 4px clamp(6px, 0.8vw, 12px) 12px;
      border-bottom: 1px solid var(--line);
    }

    .scroll-editor {
      min-height: 0;
      overflow: hidden;
      border-radius: 10px;
      border: 1px solid rgba(104, 130, 148, 0.10);
      background:
        repeating-linear-gradient(0deg, transparent 0, transparent 35px, rgba(95, 139, 166, 0.10) 36px),
        rgba(255, 255, 255, 0.18);
    }

    .body-input {
      height: 100%;
      min-height: 220px;
      overflow: auto;
      padding: 14px clamp(16px, 2vw, 24px) 22px;
      -webkit-overflow-scrolling: touch;
      line-height: 1.85;
      font-size: clamp(13px, 1.12vw, 16px);
      letter-spacing: 0.045em;
      scrollbar-width: thin;
      scrollbar-color: rgba(95, 139, 166, 0.50) transparent;
    }

    .detail-actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      min-height: 38px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid var(--line);
      color: var(--blue-deep);
      box-shadow: 0 8px 18px rgba(35, 48, 58, 0.08);

    </div>

    <div class="topbar" aria-label="页面操作">
      <button class="icon-action-btn" id="exportBtn" type="button" aria-label="导出 JSON" title="导出">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 4v9"></path>
          <path d="M8.5 9.5 12 13l3.5-3.5"></path>
          <path d="M5 16.5v2.2c0 .7.6 1.3 1.3 1.3h11.4c.7 0 1.3-.6 1.3-1.3v-2.2"></path>
        </svg>
      </button>
      <button class="icon-action-btn" id="importBtn" type="button" aria-label="导入 JSON" title="导入">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 20v-9"></path>
          <path d="M8.5 14.5 12 11l3.5 3.5"></path>
          <path d="M5 7.5V5.3C5 4.6 5.6 4 6.3 4h11.4c.7 0 1.3.6 1.3 1.3v2.2"></path>
        </svg>
      </button>
      <input class="hidden-file" id="importFile" type="file" accept="application/json,.json" />
    </div>

    <section class="view home-view is-active" id="homeView" aria-label="首页">
      <div class="home-inner">
        <header class="home-center">
          <div class="kicker">Parallel World</div>
          <h1 class="main-title" id="mainTitle">吱吱的剧笺手札</h1>
          <p class="intro" id="mainIntro">一瞬星河 • 敛作一页</p>
        </header>

        <section class="module-area" aria-label="小剧场模块列表">
          <div class="module-scroll">
            <div class="module-grid" id="moduleGrid"></div>
          </div>
        </section>

        <div class="home-actions">
          <button class="add-btn" id="addBtn" type="button">平行掠影，封存纸间</button>
        </div>
      </div>
    </section>

    <section class="view detail-view" id="detailView" aria-label="小剧场详情">
      <div class="detail-shell">
        <header class="detail-header">
          <button class="back-btn" id="backBtn" type="button" aria-label="返回首页">←</button>
          <div class="detail-label">Scene Editor</div>
          <div class="status" id="statusText">已本地保存</div>
        </header>

        <article class="editor-card">
          <div class="editor-top">
            <div class="field">
              <label for="titleInput">Title</label>
              <input class="input title-input" id="titleInput" type="text" />
            </div>

            <div class="meta-panel">
              <div class="field">
                <label for="typeInput">Type</label>
                <input class="input meta-input" id="typeInput" type="text" />
              </div>
              <div class="field">
                <label for="dateInput">Date</label>
                <input class="input meta-input" id="dateInput" type="text" />
              </div>
            </div>
          </div>

          <div class="body-wrap">
            <div class="field">
              <label for="summaryInput">Excerpt</label>
              <textarea class="textarea summary-input" id="summaryInput" rows="2"></textarea>
            </div>

            <div class="field scroll-editor">
              <textarea class="textarea body-input" id="bodyInput"></textarea>
            </div>
          </div>
        </article>

        <footer class="detail-actions">
          <button class="action-btn" id="saveBtn" type="button">保存</button>
          <button class="action-btn copy-btn" id="copyBtn" type="button">复制</button>
          <button class="action-btn" id="newFromDetailBtn" type="button">新增模块</button>
          <button class="action-btn danger" id="deleteBtn" type="button">删除当前</button>
        </footer>
      </div>
    </section>

    <div class="save-modal" id="saveModal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="saveModalTitle">
        <h2 class="modal-title" id="saveModalTitle">是否保存本次记录？</h2>
        <div class="modal-actions">
          <button class="action-btn" id="modalSaveCloseBtn" type="button">保存并返回</button>
          <button class="action-btn" id="modalCloseBtn" type="button">直接返回</button>
          <button class="action-btn danger" id="modalCancelBtn" type="button">继续编辑</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">已保存到本地</div>
  </main>

  <script>
    (function () {
      'use strict';

      if (!String.prototype.padStart) {
        String.prototype.padStart = function padStart(targetLength, padString) {
          var source = String(this);
          targetLength = targetLength >> 0;
          padString = String(padString || ' ');
          if (source.length >= targetLength) return source;
          targetLength = targetLength - source.length;
          while (padString.length < targetLength) {
            padString += padString;
          }
          return padString.slice(0, targetLength) + source;
        };
      }

      function setAppHeight() {
        var height = window.innerHeight || document.documentElement.clientHeight;
        if (height) {
          document.documentElement.style.setProperty('--app-height', height + 'px');
        }
      }

      setAppHeight();
      window.addEventListener('resize', setAppHeight, false);
      window.addEventListener('orientationchange', function () {
        setTimeout(setAppHeight, 260);
      }, false);

      function removeNode(node) {
        if (node && node.parentNode) node.parentNode.removeChild(node);
      }

      function isIOSLike() {
        return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      }

      var STORAGE_KEY = 'zz_side_theater_parallel_world_v3';

      function makeId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
        return String(Date.now()) + '-' + Math.random().toString(16).slice(2);
      }

      var defaultState = {
        meta: {
          title: '吱吱的剧笺手札',
          intro: '一瞬星河 • 敛作一页'
        },
        scenes: [
          {
            id: makeId(),
            title: '雨停以后',
            type: '短篇小剧场',
            date: '05.12',
            summary: '雨停以后，窗纸透出一点清亮。她把伞靠在廊下，他没有催，只陪她听瓦檐滴水。',
            body: '雨停以后，窗纸透出一点清亮。\n\n她把伞靠在廊下，水珠顺着伞骨一点一点落下去。他站在不远处，没有催，只低头替她把被风吹乱的纸页压好。\n\n那时候天色很淡，像一张还没有写完的信。'
          },
          {
            id: makeId(),
            title: '檐下风',
            type: '迷你番外',
            date: '05.20',
            summary: '风从竹影里绕过来，吹乱了案上的信。他伸手按住纸角，像按住一句还没出口的话。',
            body: '风从竹影里绕过来，吹乱了案上的信。\n\n他伸手按住纸角，像按住一句还没出口的话。她看见他的指节停在墨痕旁边，忽然觉得那一刻很轻，轻得像可以被夹进书页里。'
          },
          {
            id: makeId(),
            title: '旧书签',
            type: '对白摘录',
            date: '06.01',
            summary: '书签夹在泛黄的一页里，上面只有一句：春深不语，故人自来。她看了很久。',
            body: '书签夹在泛黄的一页里，上面只有一句：春深不语，故人自来。\n\n她看了很久，直到窗外的光慢慢移开，才把那张书签重新放回原处。像把一个名字，也轻轻放回心里。'
          }
        ]
      };

      var state = loadState();
      var currentId = state.scenes.length ? state.scenes[0].id : null;
      var saveTimer = null;
      var hasUnsavedChanges = false;

      var app = document.getElementById('app');
      var homeView = document.getElementById('homeView');
      var detailView = document.getElementById('detailView');
      var moduleGrid = document.getElementById('moduleGrid');
      var mainTitle = document.getElementById('mainTitle');
      var mainIntro = document.getElementById('mainIntro');
      var addBtn = document.getElementById('addBtn');
      var backBtn = document.getElementById('backBtn');
      var saveBtn = document.getElementById('saveBtn');
      var copyBtn = document.getElementById('copyBtn');
      var deleteBtn = document.getElementById('deleteBtn');
      var newFromDetailBtn = document.getElementById('newFromDetailBtn');
      var exportBtn = document.getElementById('exportBtn');
      var importBtn = document.getElementById('importBtn');
      var importFile = document.getElementById('importFile');
      var toast = document.getElementById('toast');
      var statusText = document.getElementById('statusText');
      var saveModal = document.getElementById('saveModal');
      var modalSaveCloseBtn = document.getElementById('modalSaveCloseBtn');
      var modalCloseBtn = document.getElementById('modalCloseBtn');
      var modalCancelBtn = document.getElementById('modalCancelBtn');

      var fields = {
        title: document.getElementById('titleInput'),
        type: document.getElementById('typeInput'),
        date: document.getElementById('dateInput'),
        summary: document.getElementById('summaryInput'),
        body: document.getElementById('bodyInput')
      };

      try {
        init();
      } catch (error) {
        console.error('Init failed, fallback render module cards.', error);
        emergencyRenderCards();
      }

      function init() {
        setAppHeight();
        preloadRemoteAssets();
        renderMeta();
        renderCards();
        bindEvents();
        if (currentId) fillEditor(currentId);
      }

      function preloadRemoteAssets() {
        var urls = [
          'http://43.134.240.109:5212/f/ZYfk/1.png',
          'http://43.134.240.109:5212/f/kGiN/2.png',
          'http://43.134.240.109:5212/f/84cX/3.png',
          'http://43.134.240.109:5212/f/KdSd/4.png',
          'http://43.134.240.109:5212/f/QWu6/5.png',
          'http://43.134.240.109:5212/f/5lIa/6.png',
          'http://43.134.240.109:5212/f/yosn/7.png',
          'http://43.134.240.109:5212/f/rJT6/8.png',
          'http://43.134.240.109:5212/f/LKH8/9.png',
          'http://43.134.240.109:5212/f/O9h5/10.png'
        ];
        var failed = false;
        var finished = 0;

        function done(hasFailed) {
          failed = failed || hasFailed;
          finished += 1;
          if (failed && app) app.classList.add('assets-fallback');
          if (finished === urls.length && !failed && app) app.classList.remove('assets-fallback');
        }

        urls.forEach(function (url) {
          var img = new Image();
          img.onload = function () { done(false); };
          img.onerror = function () { done(true); };
          img.src = url;
        });
      }

      function bindEvents() {
        addBtn.onclick = function () {
          var scene = createScene();
          state.scenes.unshift(scene);
          currentId = scene.id;
          commitSave('已新增并保存');
          renderCards();
          openDetail(scene.id);
        };

        newFromDetailBtn.onclick = function () {
          var scene = createScene();
          state.scenes.unshift(scene);
          currentId = scene.id;
          renderCards();
          fillEditor(scene.id);
          commitSave('已新增并保存');
        };

        backBtn.onclick = requestCloseDetail;
        saveBtn.onclick = function () { commitSave('已保存'); };
        copyBtn.onclick = copyCurrentBody;
        modalSaveCloseBtn.onclick = function () {
          commitSave('已保存');
          hideSavePrompt();
          closeDetail();
        };
        modalCloseBtn.onclick = function () {
          hideSavePrompt();
          closeDetail();
        };
        modalCancelBtn.onclick = hideSavePrompt;
        saveModal.onclick = function (event) {
          if (event.target === saveModal) hideSavePrompt();
        };

        deleteBtn.onclick = function () {
          if (!currentId) return;
          if (!window.confirm('确认删除当前小剧场吗？此操作只会删除本地缓存中的这一条。')) return;
          state.scenes = state.scenes.filter(function (item) { return item.id !== currentId; });
          currentId = null;
          renderCards();
          commitSave('已删除');
          closeDetail();
        };

        Object.keys(fields).forEach(function (key) {
          var el = fields[key];
          el.oninput = function () {
            updateCurrentScene(key, el.value);
            hasUnsavedChanges = true;
            renderCards();
            queueSave();
          };
        });

        exportBtn.onclick = exportJSON;
        importBtn.onclick = function () { importFile.value = ''; importFile.click(); };
        importFile.onchange = importJSON;

        window.addEventListener('keydown', function (event) {
          var key = String(event.key || '').toLowerCase();
          if ((event.ctrlKey || event.metaKey) && key === 's') {
            event.preventDefault();
            commitSave('已保存');
          }
          if (event.key === 'Escape' && app.classList.contains('is-detail')) requestCloseDetail();
        });

        window.addEventListener('beforeunload', function (event) {
          if (!hasUnsavedChanges) return;
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (error) {}
          event.preventDefault();
          event.returnValue = '';
        });
      }

      function renderMeta() {
        mainTitle.textContent = defaultState.meta.title;
        mainIntro.textContent = defaultState.meta.intro;
      }

      function renderCards() {
        if (!moduleGrid) return;
        moduleGrid.innerHTML = '';
        var scenes = state && state.scenes && state.scenes.length ? state.scenes : [];
        var fragment = document.createDocumentFragment();

        if (!scenes.length) {
          renderEmptyCard(moduleGrid);
          return;
        }

        scenes.forEach(function (scene, index) {
          var card = document.createElement('button');
          card.type = 'button';
          card.className = 'scene-card';
          card.setAttribute('data-count', twoDigits(index + 1));
          card.innerHTML =
            '<div class="scene-meta-line"><span>' + escapeHTML(scene.type || '未分类') + '</span><span>' + escapeHTML(scene.date || '') + '</span></div>' +
            '<h2>' + escapeHTML(scene.title || '未命名小剧场') + '</h2>' +
            '<p>' + escapeHTML(scene.summary || scene.body || '点击进入，写下一段新的平行小剧场。') + '</p>';
          card.onclick = function () { openDetail(scene.id); };
          fragment.appendChild(card);
        });

        moduleGrid.appendChild(fragment);
        if (moduleGrid.children.length === 0) emergencyRenderCards();
      }

      function renderEmptyCard(grid) {
        var card = document.createElement('button');
        card.type = 'button';
        card.className = 'scene-card';
        card.setAttribute('data-count', '+');
        card.innerHTML =
          '<div class="scene-meta-line"><span>New Scene</span><span>Now</span></div>' +
          '<h2>暂无小剧场</h2>' +
          '<p>点击这里，新增一段平行小剧场。</p>';
        card.onclick = function () {
          var scene = createScene();
          state.scenes.unshift(scene);
          currentId = scene.id;
          commitSave('已新增并保存');
          renderCards();
          openDetail(scene.id);
        };
        grid.appendChild(card);
      }

      function twoDigits(value) {
        value = String(value);
        return value.length < 2 ? '0' + value : value;
      }

      function emergencyRenderCards() {
        var grid = document.getElementById('moduleGrid');
        if (!grid) return;
        var rescueApp = document.getElementById('app');
        var scenes = defaultState && defaultState.scenes ? defaultState.scenes : [];
        grid.innerHTML = '';
        for (var i = 0; i < scenes.length; i += 1) {
          var scene = scenes[i];
          var card = document.createElement('button');
          card.type = 'button';
          card.className = 'scene-card';
          card.setAttribute('data-count', twoDigits(i + 1));
          card.innerHTML =
            '<div class="scene-meta-line"><span>' + escapeHTML(scene.type || '未分类') + '</span><span>' + escapeHTML(scene.date || '') + '</span></div>' +
            '<h2>' + escapeHTML(scene.title || '未命名小剧场') + '</h2>' +
            '<p>' + escapeHTML(scene.summary || scene.body || '点击进入，写下一段新的平行小剧场。') + '</p>';
          grid.appendChild(card);
        }
        if (rescueApp && rescueApp.className.indexOf('module-rescue') === -1) {
          rescueApp.className += ' module-rescue';
        }
      }

      function openDetail(id) {
        currentId = id;
        fillEditor(id);
        app.classList.add('is-detail');
        homeView.classList.remove('is-active');
        detailView.classList.add('is-active');
      }

      function requestCloseDetail() {
        showSavePrompt();
      }

      function showSavePrompt() {
        saveModal.classList.add('show');
        saveModal.setAttribute('aria-hidden', 'false');
      }

      function hideSavePrompt() {
        saveModal.classList.remove('show');
        saveModal.setAttribute('aria-hidden', 'true');
      }

      function closeDetail() {
        app.classList.remove('is-detail');
        detailView.classList.remove('is-active');
        homeView.classList.add('is-active');
        renderCards();
      }

      function copyCurrentBody() {
        var scene = getScene(currentId);
        var text = scene && scene.body ? scene.body : fields.body.value || '';
        if (!text.trim()) {
          showToast('正文为空');
          return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            showToast('已复制');
          }).catch(function () {
            fallbackCopy(text);
          });
        } else {
          fallbackCopy(text);
        }
      }

      function fallbackCopy(text) {
        var temp = document.createElement('textarea');
        temp.value = text;
        temp.setAttribute('readonly', '');
        temp.style.position = 'fixed';
        temp.style.left = '0';
        temp.style.top = '0';
        temp.style.width = '1px';
        temp.style.height = '1px';
        temp.style.opacity = '0';
        temp.style.fontSize = '16px';
        document.body.appendChild(temp);
        temp.focus();
        temp.select();
        try {
          temp.setSelectionRange(0, temp.value.length);
        } catch (error) {}
        try {
          document.execCommand('copy');
          showToast('已复制');
        } catch (error) {
          showToast('复制失败，请手动复制');
        }
        removeNode(temp);
      }

      function fillEditor(id) {
        var scene = getScene(id);
        if (!scene) return;
        fields.title.value = scene.title || '';
        fields.type.value = scene.type || '';
        fields.date.value = scene.date || '';
        fields.summary.value = scene.summary || '';
        fields.body.value = scene.body || '';
        if (statusText) statusText.textContent = '已本地保存';
      }

      function updateCurrentScene(key, value) {
        var scene = getScene(currentId);
        if (!scene) return;
        scene[key] = value;
        if (statusText) statusText.textContent = '编辑中…';
      }

      function getScene(id) {
        for (var i = 0; i < state.scenes.length; i++) {
          if (state.scenes[i].id === id) return state.scenes[i];
        }
        return null;
      }

      function createScene() {
        var now = new Date();
        var month = String(now.getMonth() + 1).padStart(2, '0');
        var day = String(now.getDate()).padStart(2, '0');
        return {
          id: makeId(),
          title: '未命名小剧场',
          type: '新收录',
          date: month + '.' + day,
          summary: '',
          body: '在这里写下一段新的平行小剧场。'
        };
      }

      function queueSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(function () { commitSave('已自动保存', false); }, 480);
      }

      function commitSave(message, show) {
        if (message === undefined) message = '已保存到本地';
        if (show === undefined) show = true;
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          if (statusText) statusText.textContent = '已本地保存';
          hasUnsavedChanges = false;
          if (show) showToast(message);
        } catch (error) {
          console.error(error);
          if (statusText) statusText.textContent = '保存失败';
          showToast('本地保存失败，请导出备份');
        }
      }

      function loadState() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return clone(defaultState);
          var parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.scenes)) throw new Error('Invalid data');
          return {
            meta: Object.assign({}, defaultState.meta, parsed.meta || {}),
            scenes: parsed.scenes.map(normalizeScene)
          };
        } catch (error) {
          console.warn('Load failed, use default state.', error);
          return clone(defaultState);
        }
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function normalizeScene(item) {
        return {
          id: item.id || makeId(),
          title: item.title || '未命名小剧场',
          type: item.type || '未分类',
          date: item.date || '',
          summary: item.summary || '',
          body: item.body || ''
        };
      }

      function exportJSON() {
        var data = JSON.stringify(state, null, 2);
        var blob = new Blob([data], { type: 'application/json;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var date = new Date().toISOString().slice(0, 10);
        var filename = 'zhizhi-theater-backup-' + date + '.json';

        if (isIOSLike()) {
          var opened = window.open(url, '_blank');
          if (!opened) {
            window.location.href = url;
          }
          showToast('iOS 已打开备份，请用分享保存');
          setTimeout(function () { URL.revokeObjectURL(url); }, 6000);
          return;
        }

        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        removeNode(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1200);
        showToast('JSON 已导出');
      }

      function importJSON(event) {
        var file = event.target.files && event.target.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function () {
          try {
            var parsed = JSON.parse(String(reader.result));
            var scenes = Array.isArray(parsed) ? parsed : parsed.scenes;
            if (!Array.isArray(scenes)) throw new Error('Invalid JSON');

            var shouldReplace = window.confirm('导入后将替换当前本地内容。建议先导出现有 JSON 备份。确认继续吗？');
            if (!shouldReplace) return;

            state = {
              meta: Object.assign({}, defaultState.meta, parsed.meta || {}),
              scenes: scenes.map(normalizeScene)
            };
            currentId = state.scenes.length ? state.scenes[0].id : null;
            renderMeta();
            renderCards();
            if (currentId) fillEditor(currentId);
            commitSave('JSON 已导入并保存');
          } catch (error) {
            console.error(error);
            showToast('导入失败，请检查 JSON 格式');
          } finally {
            importFile.value = '';
          }
        };
        reader.readAsText(file, 'utf-8');
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function () { toast.classList.remove('show'); }, 1500);
      }

      function escapeHTML(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    })();
  </script>
</body>
